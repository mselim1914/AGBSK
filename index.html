<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGBSK - Premium Certificate Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* خلفية بيضاء صافية تماماً */
        body {
            background-color: #ffffff;
            font-family: 'Outfit', 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
            padding: 20px;
        }

        /* الغلاف الخارجي لعمل تأثير الإضاءة المتحركة */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            padding: 4px;
            background: linear-gradient(135deg, #e2e8f0, #ffffff, #e2e8f0);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
        }

        .card-wrapper:hover {
            box-shadow: 0 30px 60px rgba(0, 51, 102, 0.15);
            background: linear-gradient(135deg, #003366, #00a8ff, #003366);
            animation: gradientBorder 3s ease infinite;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الكارت الداخلي الأساسي */
        .container {
            background-color: #ffffff;
            padding: 55px 45px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* تصميم داخلي احترافي (أنماط هندسية خفيفة في الكارت) */
        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .header-title {
            color: #0f172a;
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #0f172a, #003366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sub-title {
            color: #64748b;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 20px 25px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #f8fafc;
            color: #1e293b;
        }

        input:focus {
            outline: none;
            border-color: #003366;
            background-color: #ffffff;
            box-shadow: 0 0 0 5px rgba(0, 51, 102, 0.08);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        button:hover {
            background: #003366;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 51, 102, 0.25);
        }

        button:hover::after {
            left: 100%;
        }

        #result {
            margin-top: 40px;
            font-size: 16px;
            line-height: 1.7;
            text-align: left;
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-box {
            padding: 30px;
            border-radius: 16px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.08);
            border-left: 6px solid #10b981;
        }

        .error-box {
            padding: 25px;
            border-radius: 16px;
            background-color: #fff1f2;
            color: #be123c;
            border: 1px solid #fecdd3;
            text-align: center;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d1fae5;
            color: #047857;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
        }

        .data-table th, .data-table td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px dashed #e2e8f0;
        }

        .data-table tr:last-child th,
        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table th {
            width: 38%;
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }

        .data-table td {
            color: #0f172a;
            font-weight: 600;
            font-size: 16px;
        }

        .cert-highlight {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: 800;
            color: #003366;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }
        
        .loading-text {
            color: #003366;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="card-wrapper">
        <div class="container">
            <div class="header-title">AGBSK</div>
            <div class="sub-title">Secure Training Verification</div>
            
            <div class="input-wrapper">
                <input type="text" id="certInput" placeholder="Enter Certificate No. (e.g., 4317-AGBSK-CSE-AWR)">
            </div>
            
            <button onclick="verifyCertificate()">Verify Credentials</button>
            
            <div id="result"></div>
        </div>
    </div>

    <script>
        // AGBSK Google Sheet ID
        const sheetId = '15Zh7A9yyp1A6SN8vurtVM5n7Jc4E5SFD0zl07QnBoY8';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        function getVal(row, index) {
            if (!row || !row.c || !row.c[index] || row.c[index].v === null) return '<span style="color:#cbd5e1;">N/A</span>';
            return row.c[index].f ? row.c[index].f : row.c[index].v;
        }

        async function verifyCertificate() {
            const certNoInput = document.getElementById('certInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            
            if (!certNoInput) {
                showResult('⚠️ Please enter a certificate number to proceed.', 'error-box');
                return;
            }

            showResult('<div class="loading-text"><span>⏳</span> Authenticating with database...</div>', 'success-box');
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response failed');
                
                const text = await response.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                const rows = data.table.rows;
                
                let isFound = false;

                // Index mapping for AGBSK Sheet:
                // NAME(0), COURSE(1), DATE(2), EXPIRY(3), CERTNO(4), INSTRUCTOR(5)
                for (let i = 0; i < rows.length; i++) {
                    const certNoCell = getVal(rows[i], 4).toString().replace(/<[^>]*>?/gm, '').trim().toUpperCase(); 
                    
                    if (certNoCell === certNoInput) {
                        isFound = true;
                        
                        const name = getVal(rows[i], 0);
                        const course = getVal(rows[i], 1);
                        const date = getVal(rows[i], 2);
                        const expiry = getVal(rows[i], 3);
                        const instructor = getVal(rows[i], 5);

                        showResult(`
                            <div style="text-align: center;">
                                <div class="status-badge">✓ Verified Authenticity</div>
                            </div>
                            <table class="data-table">
                                <tr><th>Certificate ID</th><td><span class="cert-highlight">${certNoCell}</span></td></tr>
                                <tr><th>Trainee Name</th><td>${name}</td></tr>
                                <tr><th>Course Title</th><td style="color:#003366;"><strong>${course}</strong></td></tr>
                                <tr><th>Issue Date</th><td>${date}</td></tr>
                                <tr><th>Valid Until</th><td>${expiry}</td></tr>
                                <tr><th>Instructor</th><td>${instructor}</td></tr>
                            </table>
                        `, 'success-box');
                        break; 
                    }
                }

                if (!isFound) {
                    showResult('❌ Authentication Failed: No matching records found.', 'error-box');
                }

            } catch (error) {
                console.error("Connection Error:", error);
                showResult('⚠️ System Error: Unable to access the database. Please verify the Google Sheet sharing permissions are set to "Anyone with the link".', 'error-box');
            }
        }

        // Support Enter key submission
        document.getElementById("certInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                verifyCertificate();
            }
        });
    </script>

</body>
</html>
