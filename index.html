<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGBSK - Premium Verification System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* خلفية بيضاء صافية ونقية بالكامل */
        body {
            background-color: #ffffff !important;
            font-family: 'Inter', 'Tajawal', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
            padding: 20px;
        }

        /* كارت البحث - تصميم عصري وبارز لضمان الظهور */
        .main-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 520px;
            padding: 50px 40px;
            border-radius: 24px;
            /* ظل ناعم واحترافي ليعطي عمقاً على الخلفية البيضاء */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid #f0f0f0;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .main-card:hover {
            transform: translateY(-5px);
        }

        /* الهوية البصرية لـ AGBSK */
        .brand-name {
            font-size: 42px;
            font-weight: 800;
            color: #002D62; /* كحلي ملكي */
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .service-tag {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* حقل الإدخال */
        .search-box {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #002D62;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 45, 98, 0.1);
        }

        /* زر البحث الاحترافي */
        button {
            width: 100%;
            padding: 18px;
            background-color: #002D62;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 45, 98, 0.2);
        }

        button:hover {
            background-color: #001f44;
            box-shadow: 0 12px 25px rgba(0, 45, 98, 0.3);
        }

        /* منطقة النتائج */
        #displayArea {
            margin-top: 35px;
            display: none; /* مخفي حتى تظهر النتيجة */
            text-align: left;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-container {
            padding: 25px;
            border-radius: 16px;
            background-color: #ffffff;
            border: 1px solid #eee;
            border-left: 6px solid #10b981; /* لون أخضر للنجاح */
        }

        .error-container {
            padding: 20px;
            border-radius: 12px;
            background-color: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
            font-weight: 600;
            text-align: center;
        }

        /* الجدول العصري */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .info-table th {
            text-align: left;
            font-size: 13px;
            color: #888;
            padding: 10px 0;
            text-transform: uppercase;
        }

        .info-table td {
            padding: 10px 0;
            font-weight: 700;
            color: #1a1a1a;
            border-bottom: 1px solid #f5f5f5;
        }

        .cert-id {
            color: #002D62;
            background: #f0f4f8;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="brand-name">AGBSK</div>
        <div class="service-tag">Credential Verification</div>
        
        <div class="search-box">
            <input type="text" id="certInput" placeholder="Enter Certificate Number">
        </div>
        
        <button onclick="checkCertificate()">Verify Now</button>
        
        <div id="displayArea"></div>
    </div>

    <script>
        // رابط الشيت الخاص بـ AGBSK
        const SHEET_ID = '15Zh7A9yyp1A6SN8vurtVM5n7Jc4E5SFD0zl07QnBoY8';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function checkCertificate() {
            const inputVal = document.getElementById('certInput').value.trim().toUpperCase();
            const area = document.getElementById('displayArea');

            if (!inputVal) {
                renderResult('Please enter a valid ID.', 'error-container');
                return;
            }

            renderResult('🔍 Authenticating...', 'result-container');

            try {
                const res = await fetch(JSON_URL);
                const rawText = await res.text();
                const cleanJson = JSON.parse(rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1));
                const dataRows = cleanJson.table.rows;

                let match = null;

                // الأعمدة: NAME(0), COURSE(1), DATE(2), EXPIRY(3), CERTNO(4), INSTRUCTOR(5)
                for (let row of dataRows) {
                    const idInSheet = row.c[4] ? row.c[4].v.toString().toUpperCase() : '';
                    if (idInSheet === inputVal) {
                        match = {
                            name: row.c[0] ? row.c[0].v : 'N/A',
                            course: row.c[1] ? row.c[1].v : 'N/A',
                            date: row.c[2] ? (row.c[2].f || row.c[2].v) : 'N/A',
                            expiry: row.c[3] ? (row.c[3].f || row.c[3].v) : 'N/A',
                            instructor: row.c[5] ? row.c[5].v : 'N/A'
                        };
                        break;
                    }
                }

                if (match) {
                    renderResult(`
                        <div class="result-container">
                            <div style="color:#10b981; font-weight:800; margin-bottom:15px;">✓ VERIFIED RECORD FOUND</div>
                            <table class="info-table">
                                <tr><th>Full Name</th><td>${match.name}</td></tr>
                                <tr><th>Program</th><td>${match.course}</td></tr>
                                <tr><th>Issue Date</th><td>${match.date}</td></tr>
                                <tr><th>Valid Thru</th><td>${match.expiry}</td></tr>
                                <tr><th>Instructor</th><td>${match.instructor}</td></tr>
                                <tr><th>ID</th><td><span class="cert-id">${inputVal}</span></td></tr>
                            </table>
                        </div>
                    `, '');
                } else {
                    renderResult('No matching records found for this ID.', 'error-container');
                }

            } catch (err) {
                renderResult('Connection failed. Please check your internet or sheet sharing settings.', 'error-container');
            }
        }

        function renderResult(content, cssClass) {
            const area = document.getElementById('displayArea');
            area.style.display = 'block';
            area.innerHTML = cssClass ? `<div class="${cssClass}">${content}</div>` : content;
        }

        // البحث عند ضغط Enter
        document.getElementById('certInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkCertificate();
        });
    </script>
</body>
</html>
